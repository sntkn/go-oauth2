name: assignee and labels
on: pull_request

jobs:
  assignee:
    runs-on: ubuntu-latest
    steps:
      - uses: kentaro-m/auto-assign-action@0a2c53d3721e4c5cfcce6afd4014aecc337979f6 # v2.0.2
    permissions:
      contents: read
      pull-requests: write
  add-labels:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/labeler@b8dd2d9be0f68b860e7dae5dae7d772984eacd6d # v6.2.0
    permissions:
      contents: read
      pull-requests: write
